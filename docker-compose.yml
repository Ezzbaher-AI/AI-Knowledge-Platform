services:
  api:
    build: ./api
    container_name: ai_api
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - ./api/uploads:/app/uploads
      - ./api/vectors:/app/vectors
      - ./api/chroma_db:/app/chroma_db

  worker:
    build: ./api
    container_name: ai_worker
    command: celery -A celery_worker.celery_app worker --pool=solo --loglevel=info
    depends_on:
      - redis
    volumes:
      - ./api/uploads:/app/uploads
      - ./api/vectors:/app/vectors
      - ./api/chroma_db:/app/chroma_db
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}

  db:
    image: postgres:15
    container_name: ai_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: knowledge_db
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: ai_redis
    ports:
      - "6379:6379"